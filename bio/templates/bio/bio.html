{% extends 'base.html' %}

{% block title %}{{ bio.name }} - Bio{% endblock %}

{% block content %}
<div class="hero-bg">
    <h1>{{ bio.name }}</h1>
    <h3>{{ bio.job_title }}</h3>

    {% if bio.profile_picture %}
        <img src="{{ bio.profile_picture.url }}" alt="{{ bio.name }}" class="profile-pic">
    {% endif %}

    <p><strong>About Me:</strong> {{ bio.description }}</p>
</div>
{% endblock %}
