<!DOCTYPE html>
<html>
<head>
    <title>{{ bio.name }} - Portfolio</title>
</head>
<body>
    <h1>{{ bio.name }}</h1>
    <h3>{{ bio.job_title }}</h3>

    {% if bio.profile_picture %}
        <img src="{{ bio.profile_picture.url }}" alt="{{ bio.name }}" width="200">
    {% endif %}

    <p><strong>About Me:</strong> {{ bio.description }}</p>
</body>
</html>
