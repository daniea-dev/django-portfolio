{% extends 'base.html' %}

{% block title %}{{ bio.name }}'s Portfolio{% endblock %}

{% block content %}
    <div class="hero-bg">
        <div class="hero">
            {% if bio.profile_picture %}
                <img src="{{ bio.profile_picture.url }}" alt="{{ bio.name }}" class="profile-pic-large">
            {% endif %}
            <div>
                <h1>{{ bio.name }}'s Portfolio</h1>
                <h3>{{ bio.job_title }}</h3>
            </div>
        </div>

        <div class="card-grid">
            <a href="/{{ student_slug }}/bio/" class="card-link">Bio</a>
            <a href="/{{ student_slug }}/education/" class="card-link">Education</a>
            <a href="/{{ student_slug }}/skills/" class="card-link">Skills</a>
            <a href="/{{ student_slug }}/experience/" class="card-link">Experience & Projects</a>
        </div>
    </div>
{% endblock %}
