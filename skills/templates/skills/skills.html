{% extends 'base.html' %}

{% block title %}Skills{% endblock %}

{% block content %}
<div class="hero-bg">
    <h1>Skills</h1>

    {% for skill in skills_list %}
        <div class="card">
            <strong>{{ skill.name }}</strong>
            ({{ skill.get_category_display }})
            {% if skill.proficiency %}
                - {{ skill.proficiency }}
            {% endif %}
        </div>
    {% endfor %}
</div>
{% endblock %}
